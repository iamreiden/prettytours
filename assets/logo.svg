<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <defs>
    <style>
      .logo-mark { fill: #40E0D0; }
      .logo-text { fill: #1A1A1A; font-family: 'Cormorant Garamond', Georgia, serif; }
      .logo-sub  { fill: #1A1A1A; font-family: 'Lato', Arial, sans-serif; opacity: 0.55; }
    </style>
  </defs>

  <!-- Monogramme PT stylisé -->
  <circle cx="28" cy="30" r="22" fill="none" stroke="#40E0D0" stroke-width="1.5" opacity="0.35"/>
  <text x="28" y="37" class="logo-mark"
        font-size="20" font-weight="300" letter-spacing="1"
        text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif">PT</text>

  <!-- Séparateur -->
  <line x1="58" y1="12" x2="58" y2="48" stroke="#40E0D0" stroke-width="0.8" opacity="0.4"/>

  <!-- Nom -->
  <text x="70" y="28" class="logo-text"
        font-size="17" font-weight="300" letter-spacing="2"
        font-family="'Cormorant Garamond', Georgia, serif">PRETTY TOURS</text>

  <!-- Tagline -->
  <text x="70" y="43" class="logo-sub"
        font-size="7.5" letter-spacing="3"
        font-family="'Lato', Arial, sans-serif">ÎLE MAURICE</text>
</svg>
