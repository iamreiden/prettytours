<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Nos Excursions — Pretty Tours Île Maurice</title>
  <meta name="description" content="Découvrez nos excursions à l'Île Maurice : circuits terrestres, îles paradisiaques, prestations sur-mesure. Guide locale certifiée, max 8 personnes.">
  <link rel="canonical" href="https://prettytours.mu/excursions.html">

  <meta property="og:title" content="Nos Excursions — Pretty Tours Île Maurice">
  <meta property="og:description" content="Circuits terrestres, îles paradisiaques, prestations romantiques. Guide locale certifiée.">
  <meta property="og:image" content="https://prettytours.mu/assets/og-image.jpg">
  <meta property="og:url" content="https://prettytours.mu/excursions.html">

  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.29/dist/lenis.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js" defer></script>

  <style>
    /* ── Reset & Tokens ────────────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --turquoise:    #40E0D0;
      --sable:        #D4A574;
      --blanc:        #FFFFFF;
      --noir:         #1A1A1A;
      --gris-clair:   #F5F5F5;
      --gris-moyen:   #E8E8E8;
      --overlay-dark: rgba(0, 0, 0, 0.5);
      --overlay-light: rgba(255, 255, 255, 0.9);

      --font-heading: 'Cormorant Garamond', serif;
      --font-body:    'Lato', sans-serif;

      --fs-h1: clamp(3rem, 5vw, 4.5rem);
      --fs-h2: clamp(2.25rem, 4vw, 3.5rem);
      --fs-h3: clamp(1.75rem, 3vw, 2.5rem);
      --fs-body: clamp(1rem, 2vw, 1.125rem);

      --section-padding: clamp(4rem, 10vw, 8rem);
      --container-max:   1440px;
      --ease-out: cubic-bezier(0.4, 0, 0.2, 1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      font-size: var(--fs-body);
      line-height: 1.6;
      color: var(--noir);
      background: var(--blanc);
      overflow-x: hidden;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: var(--font-heading);
      font-weight: 400;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    a { color: inherit; text-decoration: none; transition: all 0.3s var(--ease-out); }
    img { max-width: 100%; height: auto; display: block; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    *:focus-visible { outline: 2px solid var(--turquoise); outline-offset: 4px; }

    /* ── Navbar ────────────────────────────────────────────────────────── */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      padding: 1.25rem 5%;
      background: var(--overlay-light);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: transform 0.4s var(--ease-out);
    }

    .logo img { height: 46px; width: auto; }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      font-weight: 300;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--noir);
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0;
      width: 0; height: 1px;
      background: var(--turquoise);
      transition: width 0.35s var(--ease-out);
    }

    .nav-links a:hover::after,
    .nav-links a.active::after { width: 100%; }
    .nav-links a.active { color: var(--turquoise); }

    .nav-toggle {
      display: none;
      flex-direction: column;
      gap: 6px;
      padding: 10px;
    }

    .nav-toggle span {
      width: 22px; height: 1px;
      background: var(--noir);
      display: block;
      transition: all 0.3s var(--ease-out);
    }

    /* ── Boutons ────────────────────────────────────────────────────────── */
    .btn-primary {
      padding: 0.75rem 1.75rem;
      background: var(--turquoise);
      color: var(--blanc);
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: center;
      min-height: 44px;
      transition: all 0.3s var(--ease-out);
    }

    .btn-primary:hover {
      background: #38c7b8;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(64, 224, 208, 0.3);
    }

    .btn-large {
      padding: 1.25rem 3rem;
      background: var(--turquoise);
      color: var(--blanc);
      border-radius: 60px;
      font-weight: 600;
      font-size: 1.05rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: center;
      min-height: 56px;
      transition: all 0.3s var(--ease-out);
    }

    .btn-large:hover {
      background: #38c7b8;
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(64, 224, 208, 0.4);
    }

    /* ── Hero ─────────────────────────────────────────────────────────── */
    .excursions-hero {
      height: 60vh;
      min-height: 400px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('/assets/le-morne-aerial.jpg');
      background-size: cover;
      background-position: center;
      transform: scale(1.05);
      will-change: transform;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.35), rgba(0,0,0,0.55));
    }

    .hero-body {
      position: relative;
      z-index: 2;
      text-align: center;
      color: var(--blanc);
      padding: 0 5%;
    }

    .hero-body .eyebrow {
      font-family: var(--font-body);
      font-size: 0.7rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--turquoise);
      margin-bottom: 1.25rem;
      opacity: 0;
      transform: translateY(15px);
    }

    .hero-body h1 {
      font-size: var(--fs-h1);
      font-weight: 300;
      margin-bottom: 1rem;
      opacity: 0;
      transform: translateY(20px);
    }

    .hero-body p {
      font-size: clamp(1rem, 2vw, 1.25rem);
      font-weight: 300;
      opacity: 0;
      transform: translateY(20px);
    }

    /* ── Barre filtres ──────────────────────────────────────────────────── */
    .filters-bar {
      background: var(--blanc);
      padding: 2rem 5%;
      border-bottom: 1px solid var(--gris-moyen);
      position: sticky;
      top: 68px;
      z-index: 90;
    }

    .filters-inner {
      max-width: var(--container-max);
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .filters-label {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #aaa;
      white-space: nowrap;
    }

    .filter-btn {
      padding: 0.6rem 1.4rem;
      border: 1px solid var(--gris-moyen);
      background: var(--blanc);
      color: var(--noir);
      border-radius: 50px;
      font-size: 0.82rem;
      font-weight: 400;
      cursor: pointer;
      transition: all 0.25s var(--ease-out);
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .filter-btn:hover {
      border-color: var(--turquoise);
      color: var(--turquoise);
    }

    .filter-btn.active {
      background: var(--turquoise);
      border-color: var(--turquoise);
      color: var(--blanc);
      font-weight: 700;
    }

    .filter-count {
      font-size: 0.72rem;
      background: rgba(0,0,0,0.08);
      border-radius: 10px;
      padding: 0.1rem 0.45rem;
    }

    .filter-btn.active .filter-count {
      background: rgba(255,255,255,0.25);
    }

    /* ── Grid ────────────────────────────────────────────────────────── */
    .excursions-section {
      padding: 4rem 5%;
      max-width: var(--container-max);
      margin: 0 auto;
    }

    .section-heading {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 2.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--gris-moyen);
    }

    .section-heading h2 {
      font-size: var(--fs-h3);
      font-weight: 300;
    }

    .section-count {
      font-size: 0.8rem;
      color: #bbb;
      letter-spacing: 0.1em;
    }

    .excursions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
      margin-bottom: 5rem;
    }

    /* ── Carte ─────────────────────────────────────────────────────────── */
    .excursion-card {
      background: var(--blanc);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
      border: 1px solid transparent;
      transition: transform 0.4s var(--ease-out), box-shadow 0.4s var(--ease-out), border-color 0.3s;
      cursor: pointer;
      opacity: 0;
      transform: translateY(24px);
    }

    .excursion-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 16px 48px rgba(64, 224, 208, 0.18);
      border-color: rgba(64, 224, 208, 0.3);
    }

    .card-img-wrap {
      position: relative;
      padding-top: 62%;
      overflow: hidden;
    }

    .card-img-wrap img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.6s var(--ease-out);
    }

    .excursion-card:hover .card-img-wrap img {
      transform: scale(1.07);
    }

    .card-badge {
      position: absolute;
      top: 1rem; right: 1rem;
      padding: 0.35rem 0.9rem;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .badge-maritime  { background: #1a78c2; color: #fff; }
    .badge-terrestre { background: #2d8a4e; color: #fff; }
    .badge-prestation{ background: var(--sable); color: #fff; }

    .card-duration-pill {
      position: absolute;
      bottom: 1rem; left: 1rem;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      color: var(--blanc);
      font-size: 0.72rem;
      padding: 0.3rem 0.7rem;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .card-body {
      padding: 1.5rem;
    }

    .card-name {
      font-family: var(--font-heading);
      font-size: 1.6rem;
      margin-bottom: 0.4rem;
      color: var(--noir);
    }

    .card-tagline {
      font-size: 0.88rem;
      color: #777;
      margin-bottom: 1.25rem;
      line-height: 1.5;
    }

    .card-meta {
      display: flex;
      gap: 1.25rem;
      font-size: 0.82rem;
      color: #999;
      margin-bottom: 1.25rem;
    }

    .card-price-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .card-price {
      font-family: var(--font-heading);
      font-size: 1.8rem;
      color: var(--turquoise);
      line-height: 1;
    }

    .card-price-sub {
      font-size: 0.75rem;
      color: #aaa;
      margin-top: 0.2rem;
    }

    .card-highlights {
      list-style: none;
      padding: 0;
      margin-bottom: 1.5rem;
    }

    .card-highlights li {
      font-size: 0.82rem;
      color: #555;
      padding: 0.3rem 0;
      padding-left: 1.2rem;
      position: relative;
      border-bottom: 1px solid var(--gris-clair);
    }

    .card-highlights li:last-child { border-bottom: none; }

    .card-highlights li::before {
      content: '';
      position: absolute;
      left: 0; top: 50%;
      width: 5px; height: 5px;
      background: var(--turquoise);
      border-radius: 50%;
      transform: translateY(-50%);
    }

    /* ── Modal ─────────────────────────────────────────────────────────── */
    [x-cloak] { display: none !important; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 10, 0.72);
      z-index: 2000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
      overscroll-behavior: contain;
    }

    @media (min-width: 768px) {
      .modal-backdrop {
        align-items: center;
        padding: 2rem;
      }
    }

    .modal-sheet {
      background: var(--blanc);
      width: 100%;
      max-width: 860px;
      max-height: 94vh;
      overflow-y: auto;
      border-radius: 20px 20px 0 0;
      position: relative;
      overscroll-behavior: contain;
    }

    @media (min-width: 768px) {
      .modal-sheet {
        border-radius: 20px;
        max-height: 88vh;
      }
    }

    .modal-hero-img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      border-radius: 20px 20px 0 0;
    }

    .modal-close {
      position: absolute;
      top: 1rem; right: 1rem;
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.9);
      border-radius: 50%;
      border: none;
      font-size: 1.4rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      z-index: 10;
    }

    .modal-close:hover { background: var(--gris-clair); }

    .modal-body {
      padding: 2rem;
    }

    .modal-header {
      margin-bottom: 2rem;
    }

    .modal-badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      margin-bottom: 0.75rem;
    }

    .modal-title {
      font-family: var(--font-heading);
      font-size: clamp(1.8rem, 4vw, 2.75rem);
      font-weight: 300;
      margin-bottom: 0.5rem;
    }

    .modal-tagline {
      font-size: 1.05rem;
      color: #777;
    }

    .modal-meta-strip {
      display: flex;
      gap: 2rem;
      padding: 1.25rem 0;
      border-top: 1px solid var(--gris-moyen);
      border-bottom: 1px solid var(--gris-moyen);
      margin: 1.5rem 0;
      flex-wrap: wrap;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .meta-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #bbb;
    }

    .meta-value {
      font-family: var(--font-heading);
      font-size: 1.2rem;
      color: var(--noir);
    }

    /* Highlights */
    .modal-section-title {
      font-family: var(--font-heading);
      font-size: 1.4rem;
      color: var(--noir);
      margin-bottom: 1rem;
    }

    .highlights-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
      margin-bottom: 2.5rem;
    }

    @media (max-width: 480px) {
      .highlights-grid { grid-template-columns: 1fr; }
    }

    .highlight-item {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      font-size: 0.9rem;
      color: var(--noir);
      padding: 0.6rem 0.75rem;
      background: var(--gris-clair);
      border-radius: 8px;
    }

    .highlight-check {
      width: 18px; height: 18px;
      background: var(--turquoise);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .highlight-check svg { width: 10px; height: 10px; }

    /* Itinéraire */
    .itinerary-track {
      border-left: 2px solid var(--turquoise);
      padding-left: 2rem;
      margin-bottom: 2.5rem;
    }

    .itin-step {
      position: relative;
      margin-bottom: 1.5rem;
    }

    .itin-step::before {
      content: '';
      position: absolute;
      left: -2.4rem; top: 0.3rem;
      width: 10px; height: 10px;
      background: var(--turquoise);
      border-radius: 50%;
      border: 2px solid var(--blanc);
      box-shadow: 0 0 0 2px var(--turquoise);
    }

    .itin-time {
      font-family: var(--font-heading);
      font-size: 1.05rem;
      color: var(--turquoise);
      font-weight: 600;
    }

    .itin-desc {
      font-size: 0.92rem;
      color: #555;
    }

    /* Inclus / Non inclus */
    .included-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-bottom: 2.5rem;
    }

    @media (max-width: 480px) {
      .included-grid { grid-template-columns: 1fr; }
    }

    .included-title {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .included-list li {
      font-size: 0.88rem;
      color: #555;
      padding: 0.35rem 0;
      border-bottom: 1px solid var(--gris-clair);
      list-style: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .included-list li:last-child { border-bottom: none; }

    .included-list li::before {
      content: '✓';
      color: var(--turquoise);
      font-weight: 700;
      font-size: 0.75rem;
    }

    .excluded-list li::before {
      content: '—';
      color: #ccc;
    }

    /* Pied de modal */
    .modal-footer {
      background: var(--gris-clair);
      padding: 2rem;
      border-radius: 0 0 20px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .modal-price-block {}

    .modal-price-label {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #aaa;
    }

    .modal-price-amount {
      font-family: var(--font-heading);
      font-size: 2.2rem;
      color: var(--turquoise);
      line-height: 1.1;
    }

    .modal-price-note {
      font-size: 0.8rem;
      color: #aaa;
    }

    /* ── Section prestations label ───────────────────────────────────── */
    .section-divider {
      max-width: var(--container-max);
      margin: 0 auto 3rem;
      padding: 0 5%;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .section-divider-line {
      flex: 1;
      height: 1px;
      background: var(--gris-moyen);
    }

    .section-divider-label {
      font-family: var(--font-heading);
      font-size: 1.1rem;
      color: #bbb;
      white-space: nowrap;
    }

    /* ── Empty state ─────────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 5rem 2rem;
      color: #bbb;
      grid-column: 1 / -1;
    }

    .empty-state p { margin-top: 0.5rem; font-size: 0.9rem; }

    /* ── WhatsApp Float ───────────────────────────────────────────────── */
    .whatsapp-float {
      position: fixed;
      bottom: 24px; right: 24px;
      z-index: 999;
      width: 60px; height: 60px;
      background: #25D366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--blanc);
      box-shadow: 0 4px 12px rgba(37,211,102,0.4);
      transition: all 0.3s var(--ease-out);
    }

    .whatsapp-float:hover {
      transform: scale(1.1);
      box-shadow: 0 8px 20px rgba(37,211,102,0.6);
    }

    /* ── Footer ─────────────────────────────────────────────────────── */
    .footer {
      background: var(--noir);
      color: var(--blanc);
      padding: 3rem 5%;
      text-align: center;
    }

    .footer p {
      font-size: 0.85rem;
      opacity: 0.5;
      margin-top: 0.5rem;
    }

    .footer a { color: var(--turquoise); }

    /* ── Responsive ─────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .nav-links {
        position: fixed;
        top: 0; right: 0;
        height: 100vh; width: 70%;
        max-width: 300px;
        background: var(--blanc);
        flex-direction: column;
        padding: 5rem 2rem 2rem;
        gap: 2rem;
        box-shadow: -5px 0 20px rgba(0,0,0,0.1);
        transform: translateX(100%);
        opacity: 0;
        transition: all 0.4s var(--ease-out);
        z-index: 999;
      }

      .nav-links.nav-open { transform: translateX(0); opacity: 1; }
      .nav-toggle { display: flex; z-index: 1001; }

      .nav-toggle.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 7px); }
      .nav-toggle.active span:nth-child(2) { opacity: 0; }
      .nav-toggle.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -7px); }

      .excursions-grid { grid-template-columns: 1fr; }
      .filters-inner { gap: 0.6rem; }
      .filter-btn { font-size: 0.75rem; padding: 0.55rem 1rem; }
      .modal-footer { flex-direction: column; align-items: flex-start; }
    }

    /* ── GSAP reveal animations ─────────────────────────────────────── */
    @keyframes fadeInUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body x-data="excursionsApp()" x-cloak>

  <!-- ── Navbar ──────────────────────────────────────────────────────────── -->
  <nav class="navbar" id="navbar">
    <a href="/" class="logo">
      <img src="/assets/logo.svg" alt="Pretty Tours" width="160" height="54">
    </a>

    <button class="nav-toggle" aria-label="Menu" id="nav-toggle">
      <span></span><span></span><span></span>
    </button>

    <ul class="nav-links" id="nav-links">
      <li><a href="/excursions.html" class="active">Excursions</a></li>
      <li><a href="/index.html#about">À Propos</a></li>
      <li><a href="/index.html#testimonials">Témoignages</a></li>
      <li><a href="/index.html#contact">Contact</a></li>
    </ul>

    <a href="#" class="btn-primary" data-whatsapp-nav>Réserver</a>
  </nav>

  <!-- ── Hero ─────────────────────────────────────────────────────────────── -->
  <header class="excursions-hero" id="hero">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-body">
      <p class="eyebrow" id="hero-eyebrow">Île Maurice · Guide Locale Certifiée</p>
      <h1 id="hero-title">Nos Excursions</h1>
      <p id="hero-sub">Découvrez l'île avec une guide qui la connaît par cœur</p>
    </div>
  </header>

  <!-- ── Barre de filtres (Alpine) ─────────────────────────────────────────── -->
  <div class="filters-bar" id="filters-bar">
    <div class="filters-inner">
      <span class="filters-label">Filtrer :</span>

      <template x-for="tab in tabs" :key="tab.key">
        <button
          class="filter-btn"
          :class="{ active: activeFilter === tab.key }"
          @click="setFilter(tab.key)"
          :aria-pressed="activeFilter === tab.key"
        >
          <span x-text="tab.icon" aria-hidden="true"></span>
          <span x-text="tab.label"></span>
          <span class="filter-count" x-text="countByFilter(tab.key)"></span>
        </button>
      </template>
    </div>
  </div>

  <!-- ── Grille d'excursions ─────────────────────────────────────────────── -->
  <main>
    <!-- Excursions filtrées -->
    <section class="excursions-section">
      <div class="section-heading">
        <h2 x-text="currentTabLabel"></h2>
        <span class="section-count" x-text="filteredExcursions.length + ' excursion' + (filteredExcursions.length > 1 ? 's' : '')"></span>
      </div>

      <div class="excursions-grid" id="excursions-grid">

        <!-- Empty state -->
        <div class="empty-state" x-show="filteredExcursions.length === 0">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ddd" stroke-width="1.5">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <p>Aucune excursion dans cette catégorie.</p>
        </div>

        <!-- Cards -->
        <template x-for="(exc, idx) in filteredExcursions" :key="exc.id">
          <article
            class="excursion-card"
            @click="openModal(exc)"
            role="button"
            :tabindex="0"
            @keydown.enter="openModal(exc)"
            :aria-label="'Voir détails : ' + exc.name"
          >
            <!-- Image -->
            <div class="card-img-wrap">
              <img
                :src="exc.image"
                :alt="exc.name"
                loading="lazy"
                width="640" height="400"
              >
              <!-- Badge catégorie -->
              <span
                class="card-badge"
                :class="{
                  'badge-maritime':   exc.category === 'maritime',
                  'badge-terrestre':  exc.category === 'terrestre',
                  'badge-prestation': exc.category === 'prestation'
                }"
                x-text="categoryLabel(exc.category)"
              ></span>
              <!-- Durée -->
              <div class="card-duration-pill" x-show="exc.duration">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
                </svg>
                <span x-text="exc.duration + 'h'"></span>
              </div>
            </div>

            <!-- Corps -->
            <div class="card-body">
              <h3 class="card-name" x-text="exc.name"></h3>
              <p class="card-tagline" x-text="exc.tagline"></p>

              <div class="card-meta">
                <span x-show="exc.duration">
                  <span x-text="exc.duration + 'h'"></span>
                </span>
                <span>Max <span x-text="exc.maxPersons"></span> pers.</span>
              </div>

              <div class="card-price-row">
                <div>
                  <div class="card-price" x-text="formatPriceExc(exc.price)"></div>
                  <div class="card-price-sub">
                    <span x-show="exc.pricePerPerson">/ personne</span>
                    <span x-show="!exc.pricePerPerson && typeof exc.price === 'number'">/ groupe</span>
                  </div>
                </div>
                <span class="btn-primary" style="pointer-events:none;font-size:0.8rem;padding:0.6rem 1.1rem;">
                  Détails
                </span>
              </div>

              <!-- Top 3 highlights -->
              <ul class="card-highlights">
                <template x-for="(h, i) in exc.highlights.slice(0, 3)" :key="i">
                  <li x-text="h"></li>
                </template>
              </ul>
            </div>
          </article>
        </template>

      </div><!-- /.excursions-grid -->
    </section>
  </main>

              <h2 class="modal-title" x-text="selectedExc.name"></h2>

              </div>

              </div>

              </div>

            <!-- Points forts -->
            <h3 class="modal-section-title">Points forts</h3>

              </svg>

        </div>
      </template>

    </div><!-- /.modal-sheet -->

  <!-- ── WhatsApp Float ─────────────────────────────────────────────────────── -->
  <a href="#" class="whatsapp-float" data-whatsapp-float aria-label="Contacter sur WhatsApp">
    <svg width="30" height="30" viewBox="0 0 32 32" fill="none">
      <path d="M16 0C7.164 0 0 7.164 0 16c0 2.825.738 5.49 2.032 7.812L0 32l8.396-2.044A15.93 15.93 0 0016 32c8.836 0 16-7.164 16-16S24.836 0 16 0zm8.14 22.607c-.352.99-1.746 1.815-2.857 2.053-.757.162-1.746.29-5.078-1.09-4.264-1.764-7.01-6.11-7.223-6.393-.208-.283-1.746-2.324-1.746-4.433 0-2.108 1.103-3.145 1.494-3.574.39-.429.857-.537 1.142-.537.284 0 .57.003.82.014.263.013.615-.099.963.734.352.843 1.195 2.915 1.3 3.126.105.211.176.457.035.74-.14.284-.21.46-.42.71-.21.25-.44.558-.63.748-.21.212-.43.44-.184.863.245.424 1.09 1.796 2.338 2.91 1.604 1.432 2.955 1.876 3.375 2.088.42.212.665.177.91-.106.245-.284.857-.995 1.085-1.337.229-.342.458-.284.774-.17.315.113 2.002.943 2.345 1.115.343.171.572.257.657.4.084.14.084.806-.268 1.796z" fill="currentColor"/>

  <!-- ── Footer ─────────────────────────────────────────────────────────────── -->
  <footer class="footer">
    <img src="/assets/logo.svg" alt="Pretty Tours" width="130" height="44" style="margin: 0 auto 1rem; filter: brightness(0) invert(1) opacity(0.5);">
    <p>&copy; <span id="footer-year"></span> Pretty Tours — Île Maurice</p>
    <p style="margin-top:0.5rem"><a href="/index.html">← Retour à l'accueil</a></p>
  </footer>

  <!-- ── Scripts ──────────────────────────────────────────────────────────────── -->
  <script src="/config.js"></script>

  <script>
    // ── Alpine App ──────────────────────────────────────────────────────────

    function excursionsApp() {
      return {
        activeFilter: 'all',
        modalOpen: false,
        selectedExc: null,

        tabs: [
          { key: 'all',        label: 'Toutes',       icon: '✦' },
          { key: 'maritime',   label: 'Maritime',     icon: '🌊' },
          { key: 'terrestre',  label: 'Terrestre',    icon: '🏔' },
          { key: 'prestation', label: 'Prestations',  icon: '💎' },
        ],

        get allExcursions() {
          return typeof getAllExcursions === 'function' ? getAllExcursions() : [];
        },

        get filteredExcursions() {
          if (this.activeFilter === 'all') return this.allExcursions;
          return this.allExcursions.filter(e => e.category === this.activeFilter);
        },

        get currentTabLabel() {
          const tab = this.tabs.find(t => t.key === this.activeFilter);
          return tab ? tab.label : 'Toutes';
        },

        countByFilter(key) {
          if (key === 'all') return this.allExcursions.length;
          return this.allExcursions.filter(e => e.category === key).length;
        },

        setFilter(key) {
          this.activeFilter = key;
          // Réanime les cartes après le filtre
          this.$nextTick(() => revealCards());
        },

        categoryLabel(cat) {
          const map = { maritime: 'Maritime', terrestre: 'Terrestre', prestation: 'Prestation' };
          return map[cat] || cat;
        },

        formatPriceExc(price) {
          return typeof formatPriceExc === 'function' ? formatPriceExc(price) : (typeof price === 'number' ? price + '€' : price);
        },

        openModal(exc) {
          this.selectedExc = exc;
          this.modalOpen = true;
          document.body.style.overflow = 'hidden';
        },

        closeModal() {
          this.modalOpen = false;
          document.body.style.overflow = '';
          setTimeout(() => { this.selectedExc = null; }, 200);
        },

        buildWhatsApp(name) {
          const msg = `Bonjour, je souhaite réserver l'excursion "${name}".`;
          return typeof getWhatsAppLink === 'function' ? getWhatsAppLink(msg) : '#';
        }
      };
    }

    // ── GSAP Animations ────────────────────────────────────────────────────

    function revealCards() {
      if (typeof gsap === 'undefined') return;
      gsap.fromTo('.excursion-card',
        { opacity: 0, y: 24 },
        { opacity: 1, y: 0, duration: 0.55, stagger: 0.06, ease: 'power2.out', clearProps: 'transform' }
      );
    }

    window.addEventListener('load', () => {
      if (typeof gsap === 'undefined') return;

      gsap.registerPlugin(ScrollTrigger);

      // Lenis
      if (typeof Lenis !== 'undefined') {
        const lenis = new Lenis({ duration: 1.2, smooth: true, smoothTouch: false });
        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add(t => lenis.raf(t * 1000));
        gsap.ticker.lagSmoothing(0);
      }

      // Hero text
      const eyebrow = document.getElementById('hero-eyebrow');
      const title   = document.getElementById('hero-title');
      const sub     = document.getElementById('hero-sub');
      gsap.to([eyebrow, title, sub], {
        opacity: 1, y: 0,
        duration: 0.85, stagger: 0.15, ease: 'power3.out', delay: 0.15
      });

      // Hero parallax
      gsap.to('#hero-bg', {
        scrollTrigger: { trigger: '#hero', start: 'top top', end: 'bottom top', scrub: 1.5 },
        y: '20%', ease: 'none'
      });

      // Filters bar navbar offset
      const nb = document.getElementById('navbar');
      if (nb) {
        const nbH = nb.offsetHeight;
        document.getElementById('filters-bar').style.top = nbH + 'px';
      }

      // Reveal cards on load
      revealCards();

      // Navbar hide/show on scroll
      let lastScroll = 0;
      window.addEventListener('scroll', () => {
        const cur = window.pageYOffset;
        if (cur > 300 && cur > lastScroll + 8) {
          gsap.to(nb, { y: '-100%', duration: 0.4, ease: 'power3.out' });
        } else if (cur < lastScroll - 8) {
          gsap.to(nb, { y: '0%', duration: 0.35, ease: 'power3.out' });
        }
        lastScroll = cur;
      }, { passive: true });
    });

    // ── Mobile Nav ─────────────────────────────────────────────────────────

    (function () {
      const toggle = document.getElementById('nav-toggle');
      const links  = document.getElementById('nav-links');
      if (!toggle || !links) return;

      toggle.addEventListener('click', () => {
        const open = links.classList.toggle('nav-open');
        toggle.classList.toggle('active');
      });

      links.querySelectorAll('a').forEach(a => {
        a.addEventListener('click', () => {
          links.classList.remove('nav-open');
          toggle.classList.remove('active');
        });
      });
    })();

    // ── WhatsApp buttons ────────────────────────────────────────────────────

    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('footer-year').textContent = new Date().getFullYear();

      if (typeof getWhatsAppLink !== 'function') return;
      document.querySelectorAll('[data-whatsapp-nav], [data-whatsapp-float]').forEach(btn => {
        btn.href = getWhatsAppLink();
      });
    });
  </script>

</body>
</html>
