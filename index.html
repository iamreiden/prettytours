<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pretty Tours - Excursions à l'Île Maurice</title>
  <meta name="description" content="Découvrez l'île Maurice avec Pretty, guide locale passionnée. Excursions personnalisées, expériences authentiques.">
  <meta http-equiv="refresh" content="0; url=/fr/">
  <script>window.location.replace('/fr/');</script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#00CED1 0%,#1A2B3C 100%);color:#fff}
    .loader{text-align:center;padding:2rem}
    .spinner{border:4px solid rgba(255,255,255,0.3);border-top:4px solid #fff;border-radius:50%;width:52px;height:52px;animation:spin 1s linear infinite;margin:0 auto 1.5rem}
    @keyframes spin{to{transform:rotate(360deg)}}
    p{font-size:1rem;margin-bottom:.75rem;opacity:.9}
    a{color:#fff;text-decoration:underline;opacity:.8}
    a:hover{opacity:1}
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>Redirection vers Pretty Tours…</p>
    <p><a href="/fr/">Cliquez ici si la redirection ne fonctionne pas</a></p>
  </div>
</body>
